<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📋 Task Manager</h1>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" data-filter="all">
                    <span>📊</span> All Tasks
                </button>
                <button class="nav-btn" data-filter="pending">
                    <span>⏳</span> Pending
                </button>
                <button class="nav-btn" data-filter="in-progress">
                    <span>⚙️</span> In Progress
                </button>
                <button class="nav-btn" data-filter="completed">
                    <span>✅</span> Completed
                </button>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
                <p id="userInfo" class="user-info"></p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <h2>My Tasks</h2>
                <button class="add-task-btn" id="openAddTaskBtn">+ Add New Task</button>
            </header>

            <!-- Task List -->
            <section class="tasks-section">
                <div id="tasksContainer" class="tasks-container">
                    <!-- Tasks will be loaded here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Add/Edit Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2 id="modalTitle">Add New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Task Title *</label>
                    <input type="text" id="taskTitle" required placeholder="Enter task title">
                </div>
                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" placeholder="Enter task description"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskDueDate">Due Date</label>
                        <input type="date" id="taskDueDate">
                    </div>
                </div>
                <div class="form-group">
                    <label for="taskStatus">Status</label>
                    <select id="taskStatus">
                        <option value="pending">Pending</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn-save">Save Task</button>
                    <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
